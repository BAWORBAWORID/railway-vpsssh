version: '3.8'

services:
  bot-wa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bot-wa
    restart: unless-stopped
    tty: true
    stdin_open: true
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
      nproc: 65535
